{% extends "base.html" %}

{% block title %}Cadastro - AngolaTravel{% endblock %}

{% block content %}
<div class="form-container">
    <h2 style="color: var(--vermelho); margin-bottom: 1.5rem;">Criar Conta</h2>
    
    <form method="POST">
        <div class="form-group">
            <label for="nome">Nome Completo *</label>
            <input type="text" id="nome" name="nome" required placeholder="Digite seu nome completo">
        </div>
        
        <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" required placeholder="seu@email.com">
        </div>
        
        <div class="form-group">
            <label for="telefone">Telefone</label>
            <input type="tel" id="telefone" name="telefone" placeholder="+244 923 456 789">
        </div>
        
        <div class="form-group">
            <label for="nif">NIF (Número de Identificação Fiscal)</label>
            <input type="text" id="nif" name="nif" placeholder="Digite seu NIF">
        </div>
        
        <div class="form-group">
            <label for="senha">Senha *</label>
            <input type="password" id="senha" name="senha" required placeholder="********">
        </div>
        
        <button type="submit" class="btn btn-vermelho" style="width: 100%;">Cadastrar</button>
    </form>
    
    <p style="margin-top: 1.5rem; text-align: center;">
        Já tem conta? <a href="{{ url_for('login') }}" style="color: var(--vermelho);">Faça login</a>
    </p>
</div>
{% endblock %}
