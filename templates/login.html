{% extends "base.html" %}

{% block title %}Login - AngolaTravel{% endblock %}

{% block content %}
<div class="form-container">
    <h2 style="color: var(--vermelho); margin-bottom: 1.5rem;">Entrar</h2>
    
    {% if erro %}
    <div class="erro">{{ erro }}</div>
    {% endif %}
    
    <form method="POST">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="seu@email.com">
        </div>
        
        <div class="form-group">
            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" required placeholder="********">
        </div>
        
        <button type="submit" class="btn btn-vermelho" style="width: 100%;">Entrar</button>
    </form>
    
    <p style="margin-top: 1.5rem; text-align: center;">
        Não tem conta? <a href="{{ url_for('cadastro') }}" style="color: var(--vermelho);">Cadastre-se</a>
    </p>
</div>
{% endblock %}
